# Managed Homebrew bundle for local macOS applies only (not Linux or Codespaces)
homebrew_bundle:
  taps: []
  formulae:
    - ghq
    - terminal-notifier
  casks: []
  mas_apps: []

# mise tool configuration
# Tool filters are OR'd within each filter key and AND'd across keys.
# Missing filters match every environment.
mise_tools:
  - fzf
  - node
  - starship
  - usage
  - shellcheck
  - "github:anomalyco/opencode"
  - name: atuin
    alias: "github:atuinsh/atuin"
    version: latest
    asset_pattern: "atuin-aarch64-apple-darwin.tar.gz"
    bin_path: "atuin-aarch64-apple-darwin"
    filters:
      os: [darwin]
      environment: [local]
  - name: atuin
    alias: "github:atuinsh/atuin"
    version: latest
    asset_pattern: "atuin-x86_64-unknown-linux-musl.tar.gz"
    bin_path: "atuin-x86_64-unknown-linux-musl"
    filters:
      os: [linux]
      environment: [codespace, devcontainer]
  - name: atuin-server
    alias: "github:atuinsh/atuin"
    version: latest
    asset_pattern: "atuin-server-aarch64-apple-darwin.tar.gz"
    bin_path: "atuin-server-aarch64-apple-darwin"
    filters:
      os: [darwin]
      environment: [local]
  - name: "github:twpayne/chezmoi"
    version: latest
    asset_pattern: "*musl*"
    filters:
      environment: [codespace, devcontainer]
  - name: gh
    filters:
      environment: [codespace, devcontainer]
  - name: tmux
    filters:
      environment: [codespace, devcontainer]
  - name: "github:twpayne/chezmoi"
    filters:
      os: [darwin]
      environment: [local]
  - name: direnv
    filters:
      environment: [codespace, devcontainer]
  - name: "github:BurntSushi/ripgrep[matching=musl]"
    filters:
      environment: [codespace, devcontainer]
  - name: "github:sharkdp/fd[matching=musl]"
    filters:
      environment: [codespace, devcontainer]
  - name: "github:sharkdp/bat[matching=musl]"
    filters:
      environment: [codespace, devcontainer]
  - name: "github:ekroon/create-codespace-and-checkout"
    version: latest
    asset_pattern: "create-codespace-and-checkout"
    filters:
      os: [darwin]
      environment: [local]
  - name: "npm:@devcontainers/cli"
    filters:
      os: [darwin]
      environment: [local]
  - name: ruby
    filters:
      os: [darwin]
      environment: [local]
  - name: go
    filters:
      os: [darwin]
      environment: [local]
  - name: gum
    filters:
      os: [darwin]
      environment: [local]
  - name: uv
    filters:
      os: [darwin]
      environment: [local]
  - name: "npm:@github/copilot"
    filters:
      os: [darwin]
      environment: [local]
  - name: "github:ekroon/copilot-token-cost"
    filters:
      os: [darwin]
      environment: [local]
  - name: "github:ekroon/tabctl"
    version: "v0.6.0-rc.3"
    filters:
      os: [darwin]
      environment: [local]
  - name: zoxide
    filters:
      os: [darwin]
      environment: [local]
  - name: bun
    filters:
      os: [darwin]
      environment: [local]
  - name: "npm:wgc"
    filters:
      os: [darwin]
      environment: [local]
  - name: ripgrep-all
    filters:
      environment: [codespace]
      repo: ["github/*"]
  - name: "npm:@github/copilot"
    filters:
      environment: [codespace]
      repo: ["github/*"]
  - name: "npm:@mariozechner/pi-coding-agent"
