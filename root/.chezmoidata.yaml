# Managed Homebrew bundle for local macOS applies only (not Linux or Codespaces)
homebrew_bundle:
  taps: []
  formulae:
    - ghq
    - kanata
    - neovim
    - terminal-notifier
  casks:
    - karabiner-elements
  mas_apps: []

# mise tool configuration
# Tool filters are OR'd within each filter key and AND'd across keys.
# Missing filters match every environment.
mise_tools:
  - fzf
  - node
  - starship
  - usage
  - shellcheck
  - "github:anomalyco/opencode"
  - name: atuin
    alias: "github:atuinsh/atuin"
    version: latest
    asset_pattern: "atuin-aarch64-apple-darwin.tar.gz"
    bin_path: "atuin-aarch64-apple-darwin"
    filters:
      os: [darwin]
      environment: [local]
  - name: atuin
    alias: "github:atuinsh/atuin"
    version: latest
    asset_pattern: "atuin-x86_64-unknown-linux-musl.tar.gz"
    bin_path: "atuin-x86_64-unknown-linux-musl"
    filters:
      os: [linux]
      environment: [codespace, devcontainer]
  - name: atuin-server
    alias: "github:atuinsh/atuin"
    version: latest
    asset_pattern: "atuin-server-aarch64-apple-darwin.tar.gz"
    bin_path: "atuin-server-aarch64-apple-darwin"
    filters:
      os: [darwin]
      environment: [local]
  - name: "github:twpayne/chezmoi"
    version: latest
    asset_pattern: "*musl*"
    filters:
      environment: [codespace, devcontainer]
  - name: gh
    filters:
      environment: [codespace, devcontainer]
  - name: "github:x-motemen/ghq"
    version: latest
    filters:
      environment: [codespace, devcontainer]
  - name: tmux
    filters:
      environment: [codespace, devcontainer]
  - name: "github:twpayne/chezmoi"
    filters:
      os: [darwin]
      environment: [local]
  - name: direnv
    filters:
      environment: [codespace, devcontainer]
  - name: "github:neovim/neovim"
    version: latest
    asset_pattern: "nvim-linux-x86_64.appimage"
    bin: "nvim"
    filters:
      os: [linux]
      environment: [codespace, devcontainer]
      not_distro_codename: [focal]
  - name: "github:BurntSushi/ripgrep[matching=musl]"
    filters:
      environment: [codespace, devcontainer]
  - name: "github:sharkdp/fd[matching=musl]"
    filters:
      environment: [codespace, devcontainer]
  - name: "github:sharkdp/bat[matching=musl]"
    filters:
      environment: [codespace, devcontainer]
  - name: "github:ekroon/create-codespace-and-checkout"
    version: latest
    asset_pattern: "create-codespace-and-checkout"
    filters:
      os: [darwin]
      environment: [local]
  - name: "npm:@devcontainers/cli"
    filters:
      os: [darwin]
      environment: [local]
  - name: ruby
    filters:
      os: [darwin]
      environment: [local]
  - name: go
    filters:
      os: [darwin]
      environment: [local]
  - name: gum
    filters:
      os: [darwin]
      environment: [local]
  - name: uv
    filters:
      os: [darwin]
      environment: [local]
  - name: "npm:@github/copilot"
    filters:
      os: [darwin]
      environment: [local]
  - name: "npm:rosie-skills"
  - name: "github:ekroon/copilot-token-cost"
    filters:
      os: [darwin]
      environment: [local]
  - name: "github:ekroon/tabctl"
    version: "v0.6.0-rc.12"
    filters:
      os: [darwin]
      environment: [local]
  - name: zoxide
    filters:
      os: [darwin]
      environment: [local]
  - name: bun
    filters:
      os: [darwin]
      environment: [local]
  - name: "npm:wgc"
    filters:
      os: [darwin]
      environment: [local]
  - name: ripgrep-all
    filters:
      environment: [codespace]
      repo: ["github/*"]
  - name: "npm:@github/copilot"
    filters:
      environment: [codespace]
      repo: ["github/*"]
  - name: "npm:@earendil-works/pi-coding-agent"
  - name: "github:ogulcancelik/herdr"
    version: latest
    variants:
      - asset_pattern: "herdr-macos-aarch64"
        bin: "herdr"
        filters:
          os: [darwin]
      - asset_pattern: "herdr-linux-x86_64"
        bin: "herdr"
        filters:
          os: [linux]

# Agent skill management
agent_skills:
  private_github_agent_skills:
    managed_checkout_relative_path: ".cache/rosie/private/github-agent-skills"
    ref: "07770dbfdc26d208eaca6013b1c5811fa39d5438"
    skill_path: "splunk-log-analysis-skill"
